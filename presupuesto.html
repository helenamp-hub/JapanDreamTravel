<!DOCTYPE html>

</header>

<section>

<form id="formulario">

    <h2>Datos de contacto</h2>

    <label>Nombre</label>
    <input type="text" id="nombre" required>

    <label>Apellidos</label>
    <input type="text" id="apellidos" required>

    <label>Teléfono</label>
    <input type="text" id="telefono" required>

    <label>Email</label>
    <input type="email" id="email" required>

    <h2>Presupuesto del viaje</h2>

    <label>Destino</label>

    <select id="producto">
        <option value="1200">Tokio - 1200€</option>
        <option value="1500">Kioto - 1500€</option>
        <option value="2000">Ruta completa Japón - 2000€</option>
    </select>

    <label>Días del viaje</label>
    <input type="number" id="plazo" min="1" max="30">

    <h2>Extras</h2>

    <label>
        <input type="checkbox" class="extra" value="200">
        Hotel Premium (+200€)
    </label>

    <label>
        <input type="checkbox" class="extra" value="100">
        Seguro de viaje (+100€)
    </label>

    <label>
        <input type="checkbox" class="extra" value="150">
        Guía turístico (+150€)
    </label>

    <h2>Presupuesto final</h2>

    <input type="text" id="presupuestoFinal" readonly>

    <label>
        <input type="checkbox" id="condiciones">
        Acepto las condiciones de privacidad
    </label>

    <button type="submit">Enviar</button>

    <button type="reset">Resetear</button>

</form>

</section>

<footer>
    <p>Presupuesto de viajes a Japón</p>
</footer>

<script src="js/presupuesto.js"></script>

</body>
</html>
